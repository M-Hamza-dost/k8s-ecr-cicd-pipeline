apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: 252475680078.dkr.ecr.us-east-1.amazonaws.com/my-web-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80